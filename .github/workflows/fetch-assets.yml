name: Fetch site assets
# Downloads the site's images from the Squarespace CDN into assets/images/
# and commits them. Run this once (Actions tab -> "Fetch site assets" ->
# Run workflow) before Squarespace is cancelled. Safe to re-run.

on:
  workflow_dispatch:
  push:
    paths:
      - asset-manifest.txt

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download assets from manifest
        run: |
          mkdir -p assets/images
          missing=0
          while read -r name url; do
            [ -z "$name" ] && continue
            if [ -s "assets/images/$name" ]; then
              echo "exists: $name"; continue
            fi
            echo "fetching: $name"
            if ! curl -fsSL --retry 3 -o "assets/images/$name" "$url"; then
              echo "FAILED: $name  $url"; missing=$((missing+1))
            fi
          done < asset-manifest.txt
          echo "failed count: $missing"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A assets/images
          git diff --cached --quiet || git commit -m "Add site images fetched from Squarespace CDN"
          git push
